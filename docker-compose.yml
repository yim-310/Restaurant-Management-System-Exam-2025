version: '3.8'

networks:
  rms-network:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://neondb_owner:npg_dKkBrflL9GT8@ep-proud-pine-app92wnm-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
      - JWT_SECRET=SuperSecretKey123!
      - CORS_ORIGIN=http://localhost:80
    networks:
      - rms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - rms-network
    depends_on:
      backend:
        condition: service_healthy